<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.7) 0%, rgba(226, 232, 240, 0.9) 100%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-blend-mode: overlay;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.6s ease-out;
        }



        form {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08),
                0 1px 3px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        form h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c63ff 0%, #4a00e0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        form p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-top: -16px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #334155;
            letter-spacing: 0.2px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border-color: #6c63ff;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.12);
        }


        .btn {
            display: flex;
            margin-top: 8px;
        }

        .btn button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #6c63ff 0%, #4a00e0 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(108, 99, 255, 0.25);
        }

        .btn button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.35);
        }

        .btn button:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .form-footer p {
            font-size: 14px;
            color: #64748b;
        }

        .form-footer a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .form-footer a:hover {
            color: #4a00e0;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <form class="reset-form">
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your email and choose a secure new password to update your account.</p>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="Enter your registered email" required>
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" name="password" id="password" placeholder="Create a new password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" name="confirm-password" id="confirm-password"
                    placeholder="Confirm your new password" required>
            </div>

            <div class="btn">
                <button type="submit"><strong>Reset Password</strong></button>
            </div>

            <div class="form-footer">
                <p>Remembered your password? <a href="login.html">Log In</a></p>
            </div>
        </form>
    </div>

</body>

</html>
