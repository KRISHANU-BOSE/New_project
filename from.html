<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.7) 0%, rgba(226, 232, 240, 0.9) 100%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-blend-mode: overlay;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            animation: fadeIn 0.6s ease-out;
        }

        form {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08),
                0 1px 3px rgba(0, 0, 0, 0.04);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        form h2 {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 12px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c63ff 0%, #4a00e0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }


        .form-group {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }


        .course-group,
        .place-group {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }


        .form-group:has(textarea),
        .gender-group,
        .skill-group,
        .file,
        .terms-group,
        .btn,
        .form-footer {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #334155;
            letter-spacing: 0.2px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input::placeholder,
        textarea::placeholder {
            color: #94a3b8;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #6c63ff;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.12);
        }


        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            background: #f8fafc;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            width: 100%;
        }

        .gender-group,
        .skill-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gender-group label,
        .skill-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            margin-bottom: 0;
        }


        input[type="checkbox"],
        input[type="radio"] {
            width: 18px;
            height: 18px;
            padding: 0;
            margin: 0;
            cursor: pointer;
            accent-color: #6c63ff;
        }

        .file {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file input[type="file"] {
            padding: 8px 12px;
            background: #f8fafc;
            cursor: pointer;
        }

        .file input[type="file"]::file-selector-button {
            background: #6c63ff;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .file input[type="file"]::file-selector-button:hover {
            background: #5146d8;
        }

        .terms-group {
            display: flex;
            justify-content: center;
            margin: 8px 0;
        }

        .terms-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
        }


        .btn {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .btn button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn button[type="submit"] {
            background: linear-gradient(135deg, #6c63ff 0%, #4a00e0 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(108, 99, 255, 0.25);
        }

        .btn button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.35);
        }

        .btn button[type="submit"]:active {
            transform: translateY(0);
        }

        .btn button[type="reset"] {
            background: #e2e8f0;
            color: #475569;
        }

        .btn button[type="reset"]:hover {
            background: #cbd5e1;
            color: #1e293b;
            transform: translateY(-2px);
        }

        .btn button[type="reset"]:active {
            transform: translateY(0);
        }


        .form-footer {
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .form-footer p {
            font-size: 14px;
            color: #64748b;
        }

        .form-footer a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .form-footer a:hover {
            color: #4a00e0;
            text-decoration: underline;
        }


        @media (max-width: 650px) {
            form {
                grid-template-columns: 1fr;
                padding: 24px;
                gap: 16px;
            }

            form h2 {
                font-size: 26px;
            }

            .form-group,
            .course-group,
            .place-group,
            .form-group:has(textarea),
            .gender-group,
            .skill-group,
            .file,
            .terms-group,
            .btn,
            .form-footer {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <form class="registration-form">
            <h2>Student Registration</h2>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="14" max="21" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter phone number">
            </div>

            <div class="gender-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label for="Male"><input type="radio" id="Male" name="gender"> Male</label>
                    <label for="Female"><input type="radio" id="Female" name="gender"> Female</label>
                    <label for="Other"><input type="radio" id="Other" name="gender"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea rows="4" placeholder="Enter your address"></textarea>
            </div>


            <div class="course-group">
                <label for="course">Select Course</label>
                <select id="course" name="course">
                    <option>Choose Course</option>
                    <option>BCA</option>
                    <option>B.Tech</option>
                    <option>B.Sc</option>
                    <option>MCA</option>
                    <option>M.Tech</option>
                </select>
            </div>

            <div class="place-group">
                <label>Place</label>
                <select id="place" name="place" required>
                    <option value="" selected>Choose place</option>
                    <option value="Kolkata">Kolkata</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Mumbai">Mumbai</option>
                    <option value="Bangalore">Bangalore</option>
                </select>
            </div>

            <div class="skill-group">
                <label>Skills</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="HTML" value="HTML"> HTML</label>
                    <label><input type="checkbox" id="CSS" value="CSS"> CSS</label>
                    <label><input type="checkbox" id="JAVASCRIPT" value="JAVASCRIPT"> JavaScript</label>
                    <label><input type="checkbox" id="PYTHON" value="PYTHON"> Python</label>
                    <label><input type="checkbox" id="JAVA" value="JAVA"> Java</label>
                </div>
            </div>

            <div class="file">
                <label for="file">Upload Files</label>
                <input type="file" id="file" name="file" accept=".pdf,image/*" multiple required>
            </div>

            <div class="terms-group">
                <label>
                    <input type="checkbox" required>
                    I agree to the Terms & Conditions
                </label>
            </div>

            <div class="btn">
                <button type="submit"><strong>Register</strong></button>
                <button type="reset"><strong>Reset</strong></button>
            </div>

            <div class="form-footer">
                <p>If you already registered, <a href="login.html">Log in</a></p>
            </div>
        </form>
    </div>

</body>

</html>
